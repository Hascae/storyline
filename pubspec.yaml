name: monogatari_clock
description: 物語時鐘 —— 把一天讀成一個故事的時鐘應用。鬧鐘、世界時鐘、計時器與碼錶。
publish_to: 'none'
version: 1.3.0+7

environment:
  sdk: ^3.12.0

dependencies:
  alarm: ^5.5.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_local_notifications: ^22.0.1
  flutter_timezone: ^5.1.0
  shared_preferences: ^2.5.5
  timezone: ^0.11.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/monogatari_bell.wav
